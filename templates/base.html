<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notify{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script>
        (function () {
            const storedTheme = localStorage.getItem("notify-theme");
            const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            document.documentElement.dataset.theme = storedTheme || preferredTheme;
        })();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
